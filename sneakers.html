<!-- HERO PEQUEÑO -->
<section class="hero d-flex align-items-center text-center" style="height: 40vh;">
  <div class="container">
    <h1 class="fw-bold text-shadow">Sneakers Collection</h1>
    <p class="text-shadow">Streetwear • Estilo • Actitud</p>
  </div>
</section>

<!-- CONTENIDO -->
<section class="container py-5">

  <div class="row mb-4 align-items-center">

    <!-- TITULO + FILTROS -->
    <div class="col-md-6">
      <h2 class="section-title">Sneakers</h2>

      <div class="mt-3">
        <button class="btn filtro activo">Todos</button>
        <button class="btn filtro">Hombre</button>
        <button class="btn filtro">Mujer</button>
      </div>
    </div>

    <!-- BUSCADOR -->
    <div class="col-md-6">
      <input type="text" id="buscarInput" class="form-control search-input" placeholder="Buscar sneakers...">
    </div>

  </div>

  <!-- GRID -->
  <div id="productosGrid" class="row g-4"></div>

</section>

<!-- MODAL -->
<!-- MODAL MODERNO -->
<div class="modal fade" id="modalProducto">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content bg-dark text-white rounded-4 p-3">

      <!-- HEADER -->
      <div class="modal-header border-0">
        <h5 id="modalTitulo" class="fw-bold"></h5>
        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <!-- BODY -->
      <div class="modal-body">

        <div class="row">

          <!-- IMAGEN -->
          <div class="col-md-6 text-center">
            <img id="modalImagen" class="img-fluid rounded-4 shadow">
          </div>

          <!-- INFO -->
          <div class="col-md-6">

            <p id="modalDescripcion" class="text-secondary"></p>

            <!-- COLORES -->
            <div class="mt-4">
              <h6 class="fw-bold mb-2">Color</h6>
              <div class="d-flex gap-2" id="coloresContainer">
                <button class="color-option active" data-color="Negro" style="background:black;"></button>
                <button class="color-option" data-color="Blanco" style="background:white; border:1px solid #ccc;"></button>
                <button class="color-option" data-color="Rojo" style="background:red;"></button>
              </div>
            </div>

            <!-- TALLAS -->
            <div class="mt-4">
              <h6 class="fw-bold mb-2">Talla</h6>
              <div class="d-flex flex-wrap gap-2" id="tallasContainer">
                <button class="talla-option">36</button>
                <button class="talla-option">37</button>
                <button class="talla-option">38</button>
                <button class="talla-option">39</button>
                <button class="talla-option">40</button>
                <button class="talla-option">41</button>
                <button class="talla-option">42</button>
              </div>
            </div>

            <!-- BOTON -->
            <div class="mt-4">
              <button class="btn btn-pink w-100 fw-bold" onclick="agregarConOpciones()">
                Agregar al carrito
              </button>
            </div>

          </div>

        </div>

      </div>

    </div>
  </div>
</div>
