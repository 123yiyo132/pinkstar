<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Checkout - PINK STAR</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link rel="stylesheet" href="css/checkout.css">
</head>

<body>

<div class="container py-4">

  <!-- HEADER -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold">Checkout PINK STAR</h2>

    <a href="index.html" class="btn btn-outline-light">
      Volver
    </a>
  </div>

  <div class="row g-3">

    <!-- PRODUCTOS -->
    <div class="col-lg-7">
      <div class="card-box">
        <h5>Productos</h5>
        <div id="listaCarrito"></div>
      </div>
    </div>

    <!-- CLIENTE -->
    <div class="col-lg-5">
      <div class="card-box">

        <h5>Datos del cliente</h5>

        <input id="clienteNombre" class="form-control mb-2" placeholder="Nombre">
        <input id="clienteDireccion" class="form-control mb-2" placeholder="Dirección">
        <input id="clienteTelefono" class="form-control mb-3" placeholder="Teléfono">

        <h5>Total</h5>
        <h3 class="text-success" id="totalCarrito">₡0</h3>

        <button class="btn btn-primary w-100 mt-3" onclick="generarPDF()">
          Generar factura
        </button>

        <button class="btn btn-success w-100 mt-3" id="btnWsp" onclick="abrirWhatsApp()" disabled>
          Enviar por WhatsApp
        </button>

      </div>
    </div>

  </div>
</div>

<!-- MODAL PDF -->
<div class="modal fade" id="modalPDF">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content bg-dark text-white">

      <div class="modal-header">
        <h5>Vista de factura</h5>
        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <iframe id="pdfFrame"></iframe>
      </div>

    </div>
  </div>
</div>

<script src="js/checkout.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
