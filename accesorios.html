<section class="hero d-flex align-items-center text-center" style="height: 40vh;">

    <p class="text-shadow">Moda urbana • Tenis • Streetwear Premium</p>

</section>

<!-- CONTENIDO -->
<section class="container py-5">

  <div class="row mb-4 align-items-center">

    <!-- FILTROS -->
    <div class="col-md-6">
      <h2 class="section-title">Accesorios</h2>

      <div class="mt-3 d-flex gap-2 flex-wrap">
        <button class="btn filtro activo" data-categoria="Todos">Todos</button>
        <button class="btn filtro" data-categoria="Hombre">Gorras</button>
        <button class="btn filtro" data-categoria="Mujer">Medias</button>
        <button class="btn filtro" data-categoria="Niño ">Guantes</button>
        <button class="btn filtro" data-categoria="Niña">Bolsos</button>
      </div>
    </div>

    <!-- BUSCADOR -->
    <div class="col-md-6">
      <input type="text" id="buscarInput" class="form-control search-input" placeholder="Buscar Accesorios...">
    </div>

  </div>

  <!-- GRID -->
  <div id="productosGrid" class="row g-4"></div>

</section>

<!-- MODAL PRODUCTO -->
<div class="modal fade" id="modalProducto">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content bg-dark text-white rounded-4 p-3">

      <!-- HEADER -->
      <div class="modal-header border-0">
        <h5 id="modalTitulo" class="fw-bold"></h5>
        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <!-- BODY -->
      <div class="modal-body">
        <div class="row">
          <!-- IMAGEN -->
          <div class="col-md-6 text-center">
            <img id="modalImagen" class="img-fluid rounded-4 shadow">
          </div>
          <!-- INFO -->
          <div class="col-md-6">
            <p id="modalDescripcion" class="text-secondary"></p>

            <!-- COLORES -->
            <div class="mt-4">
              <h6 class="fw-bold mb-2">Color</h6>
              <div class="d-flex gap-2" id="coloresContainer"></div>
            </div>

            <!-- TALLAS -->
            <div class="mt-4">
              <h6 class="fw-bold mb-2">Talla</h6>
              <div class="d-flex flex-wrap gap-2" id="tallasContainer"></div>
            </div>

            <!-- BOTON -->
            <div class="mt-4">
              <button class="btn btn-pink w-100 fw-bold" id="agregarCarritoBtn">
                Agregar al carrito
              </button>
            </div>

          </div>
        </div>
      </div>

    </div>
  </div>
