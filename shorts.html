<!-- CARRITO -->
<a href="#" id="btnAbrirCarrito" class="carrito-float">
  🛒 <span id="carritoBadge" class="badge bg-danger">0</span>
</a>

<!-- HERO -->
<section class="hero d-flex align-items-center text-center" style="height: 40vh;">
  <div class="container">
    <h1 class="fw-bold text-shadow">Shorts Urbanos</h1>
    <p class="text-shadow">Moda urbana • Streetwear • Estilo premium</p>
  </div>
</section>

<!-- CONTENIDO -->
<section class="container py-5">

  <div class="row mb-4 align-items-center">

    <!-- FILTROS -->
    <div class="col-md-6">
      <h2 class="section-title">Shorts</h2>

      <div class="d-flex flex-wrap gap-2 mt-3">

        <button class="btn filtro activo" data-categoria="Todos">Todos</button>
        <button class="btn filtro" data-categoria="Cargo">Cargo</button>
        <button class="btn filtro" data-categoria="Basketball Shorts">Basketball Shorts</button>
        <button class="btn filtro" data-categoria="Jogger Shorts">Jogger Shorts</button>
        <button class="btn filtro" data-categoria="Denim Shorts">Denim Shorts</button>
        <button class="btn filtro" data-categoria="Street Style">Street Style</button>
        <button class="btn filtro" data-categoria="Oversized">Oversized</button>
        <button class="btn filtro" data-categoria="Techwear">Techwear</button>
        <button class="btn filtro" data-categoria="Basic / Essentials">Basic</button>

      </div>
    </div>

    <!-- BUSCADOR -->
    <div class="col-md-6">
      <input type="text" id="buscarInput" class="form-control search-input" placeholder="Buscar Shorts...">
    </div>

  </div>

  <!-- GRID -->
  <div id="productosGrid" class="row g-4"></div>

</section>

<!-- MODAL PRODUCTO -->
<div class="modal fade" id="modalProducto">
  <div class="modal-dialog modal-lg modal-dialog-centered">

    <div class="modal-content bg-dark text-white p-3 rounded-4">

      <div class="modal-header border-0">
        <h5 id="modalTitulo" class="fw-bold"></h5>
        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <div class="row">

          <div class="col-md-6 text-center">
            <img id="modalImagen" class="img-fluid rounded-4 shadow">
          </div>

          <div class="col-md-6">

            <span id="modalEstilo" class="badge bg-primary mb-2"></span>

            <p id="modalDescripcion" class="text-secondary"></p>

            <h4 id="modalPrecio" class="text-success fw-bold"></h4>

            <div class="mt-3">
              <h6 class="fw-bold">Talla</h6>
              <div id="tallasContainer" class="d-flex gap-2 flex-wrap"></div>
            </div>

            <div class="mt-4">
              <button id="btnAgregarCarrito"
                      class="btn btn-primary w-100 fw-bold"
                      disabled>
                🛒 Agregar al carrito
              </button>
            </div>

          </div>

        </div>
      </div>

    </div>
  </div>
</div>

<!-- MODAL CARRITO -->
<div class="modal fade" id="modalCarrito">
  <div class="modal-dialog modal-lg modal-dialog-centered">

    <div class="modal-content cart-modal">

      <div class="modal-header cart-header">
        <h5>🛒 Tu Carrito</h5>
        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body cart-body" id="modalCarritoBody">
        <div class="text-center text-muted">Carrito vacío</div>
      </div>

      <div class="modal-footer cart-footer">
        <h4 id="totalCarrito">₡0</h4>

        <button class="btn btn-success btn-sm" onclick="irCheckout()">
  Pagar ahora
</button>
      </div>

    </div>
  </div>
</div>
